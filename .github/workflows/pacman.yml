name: generate animation

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: write  # <--- ISSO AQUI É O QUE FALTA!

jobs:
  # ... resto do código
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera o jogo da cobrinha (ou pacman dependendo da versão)
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&snake_type=pacman&color_snake=yellow
      outputs: |
            dist/pacman-contribution-graph.svg?snake_type=pacman&color_snake=yellow
            dist/pacman-contribution-graph-dark.svg?snake_type=pacman&color_snake=yellow&palette=github-dark
      # Sobe os arquivos gerados para uma branch chamada 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
